<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Busca do Filhote</title>
    <link rel="shortcut icon" href="../assets/iconOfSite.png" type="image/png">
    <link rel="stylesheet" href="../style/game1.css">
    
    <link rel="preload" href="../assets/game1-assets/wallpaper-normal.png" as="image">
    <link rel="preload" href="../assets/game1-assets/wallpaper-geada.png" as="image">
    <link rel="preload" href="../assets/game1-assets/wallpaper-geada-lado.png" as="image">
    <link rel="preload" href="../assets/game1-assets/wallpaper-mato.png" as="image">
    <link rel="preload" href="../assets/paiqueroquero_static.png" as="image">
    <link rel="preload" href="../assets/filhotes_static.png" as="image">
    <link rel="preload" href="../assets/capivara_static.png" as="image">
    <link rel="preload" href="../assets/cavalo_static.png" as="image">
    <link rel="preload" href="../assets/jacana_static.png" as="image">
    <link rel="preload" href="../assets/urutu_static.png" as="image">
    <link rel="preload" href="../assets/graxaim_static.png" as="image">
    <link rel="preload" href="../assets/carcara_static.png" as="image">
    <link rel="preload" href="../assets/filhoteperdido_scream.png" as="image">
</head>

<body>
    <div id="quest-box">
        <span id="quest-title">Dica:</span>
        <span id="quest-text"></span>
    </div>

    <div id="map-container"></div>

    <div id="dialogue-box">
        <div id="dialogue-text"></div>
        <div id="dialogue-hint">Clique para continuar</div>
    </div>

    <div id="biome-arrows">
        <div class="arrow arrow-up">↑<span class="label"></span></div>
        <div class="arrow arrow-down">↓<span class="label"></span></div>
        <div class="arrow arrow-left">←<span class="label"></span></div>
        <div class="arrow arrow-right">→<span class="label"></span></div>
    </div>

    <div id="rotate-warning">
        Por favor, deite o celular na horizontal para jogar.
    </div>

    <div id="joystick-zone">
        <div id="joystick-base">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <!-- Menu Persistente e Modal -->
    <div id="persistent-menu-btn" title="Menu">☰</div>

    <div id="game-menu-overlay" style="display: none;">
        <div id="game-menu-modal">
            <h2 id="menu-title">Pausado</h2>
            <button id="btn-continuar" class="menu-btn">Continuar</button>
            <button id="btn-reiniciar" class="menu-btn">Reiniciar Jogo</button>
            <button id="btn-voltar-index" class="menu-btn">Voltar ao site principal</button>
        </div>
    </div>

    <script src="../scripts/game1.js" defer></script>
</body>
</html>
