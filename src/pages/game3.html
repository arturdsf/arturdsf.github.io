<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voo do Filhote</title>
    <link rel="stylesheet" href="../style/game3.css">
    <!-- Preload críticos para menos flicker (arquivos detectados em assets/) -->
    <link rel="preload" href="../assets/player.png" as="image">
    <link rel="preload" href="../assets/game3-assets/fundo.png" as="image">
    <link rel="preload" href="../assets/game3-assets/tronco.png" as="image">
    <link rel="preload" href="../assets/game3-assets/ventania.png" as="image">
    <link rel="preload" href="../assets/game3-assets/buraco.png" as="image">
</head>

<body>
    <!-- Assets: IDs = nome do PNG. Caminho: ./assets/ (mova os PNG para src/assets/) -->
    <img id="player" src="../assets/player.png" style="display: none;" crossorigin>
    <img id="tronco" src="../assets/game3-assets/tronco.png" style="display: none;" crossorigin>
    <img id="ventania" src="../assets/game3-assets/ventania.png" style="display: none;" crossorigin>
    <img id="buraco" src="../assets/game3-assets/buraco.png" style="display: none;" crossorigin>
    <img id="fundo" src="../assets/game3-assets/fundo.png" style="display: none;" crossorigin>

    <div class="ui">
        <div>🚀 Distância: <span id="score">0</span>m</div>
        <div>❤️ Vidas: <span id="lives">3</span></div>
        <div>⭐ Nível: <span id="level">1</span></div>
        <div>⚡ Velocidade: <span id="speed">1.0x</span></div>
        <div>📝 Palavra: <span id="wordProgress">---</span></div>
    </div>

    
    <div id="gameOver" class="game-over">
        <div>😢 GAME OVER</div>
        <div>🚀 Distância Final: <span id="finalScore">0</span>m</div>
        <button class="restart-btn" onclick="restartGame()">🔄 Jogar Novamente</button>
    </div>

    <div id="levelComplete" class="level-complete">
        <div>🎉 NÍVEL <span id="completedLevel">1</span> CONCLUÍDO!</div>
        <div>🚀 Próximo: <span id="nextTarget">200</span>m</div>
        <button class="next-btn" id="nextLevelBtn" onclick="nextLevel()">➡️ Próximo Nível</button>
        <button class="restart-btn" onclick="restartGame()">🔄 Reiniciar</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="../scripts/game3.js" defer></script>
</body>

</html>
